services:
  mailmoto:
    container_name: mailmoto
    image: ghcr.io/mcbtaguiad/mailmoto:v0.1.6
    build:
        context: .
        dockerfile: Dockerfile
    environment:
      MAIL_HOSTNAME: mail.yourdomain
      MAIL_DOMAIN: yourdomain
      RSPAMD_ENABLE: true
    volumes:
      - ./tls/fullchain.pem:/data/tls/fullchain.pem
      - ./tls/privkey.pem:/data/tls/privkey.pem
      - ./data:/data
      # - ./log/mail.log:/var/log/mail.log
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993" 
    restart: always
    healthcheck:
      test:
        - CMD
        - nc
        - -z
        - localhost
        - "25"
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
